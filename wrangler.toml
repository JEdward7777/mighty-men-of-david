# ============================================================
# Mighty Men of David - Cloudflare Workers Configuration
# ============================================================
# Server-authoritative architecture:
#   - One `GameRoom` Durable Object per game code holds the game state.
#   - Players connect over WebSocket; each gets a per-player filtered view.
# ============================================================

name = "mighty-men-game"
main = "src/worker.js"
compatibility_date = "2025-01-01"

[vars]
GAME_EXPIRY_SECONDS = "7200"  # 2 hours (informational; DO uses its own alarm)

# Durable Object that hosts each game room.
[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

# SQLite-backed Durable Object storage.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[assets]
directory = "./public"
binding = "ASSETS"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
